name: "Java Runner"

description: "Compile and run Java program"

inputs:
  file-name:
   description: "java file name"
   required : true

runs:
  using: "composite"

  steps:
    - name: Compile Java
      run: javac ${{ inputs.file-name }}.java
      shell: bash

    - name: Run Java
      run: java ${{inputs.file-name}}
      shell: bash

    - name: Print output
      run: echo "${{ steps.build.outputs.result }}"  

      